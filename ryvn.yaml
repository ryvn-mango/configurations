apiVersion: v1

promotionPipelines:
  - name: main-pipeline
    paths:
      - sourceChannel: staging
        targetChannel: production
        criteria:
          type: manual
      
      - sourceChannel: production
        targetChannel: stable
        criteria:
          type: canary
          installationFilters:
            include:
              - environment: prod-us-east
            # exclude:
            #   - environment: prod-eu-*
            #   - environmentLabel:
            #       key: "air-gapped"
          conditions:
            promoteWhenHealthy:
              thresholdPercent: 95
              duration: 24h
            # promoteWhenMinInstallations:
            #   thresholdCount: 5
            # recallWhenUnhealthy:
            #   thresholdPercent: 5
            #   duration: 2h

maintenanceWindows:
  - name: main-window
    timeZone: America/New_York
    intervals:
      - MONDAY/9:00-MONDAY/22:00
      - TUESDAY/9:00-TUESDAY/22:00
      - WEDNESDAY/9:00-WEDNESDAY/22:00
      - THURSDAY/9:00-THURSDAY/22:00
      - FRIDAY/9:00-FRIDAY/22:00

  - name: jp-morgan
    timeZone: America/New_York
    intervals:
      - MONDAY/15:00-TUESDAY/09:00
      - TUESDAY/15:00-WEDNESDAY/09:00
      - WEDNESDAY/15:00-THURSDAY/09:00
      - THURSDAY/15:00-FRIDAY/09:00
      - FRIDAY/15:00-MONDAY/24:00

services:
  - name: frontend-nextjs
    type: server
    repo: ryvn-mango/nextjs
    build:
      buildpack: nixpack
  
