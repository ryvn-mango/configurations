apiVersion: v1

services:
  # Dockerfile-based Services
  - name: frontend-nextjs
    type: server
    repo: ryvn-mango/nextjs
    build:
      dockerfile: Dockerfile
    promotionPipeline: product-team-pipeline
  - name: backend-fastapi
    type: server
    repo: ryvn-mango/fastapi
    build:
      dockerfile: Dockerfile
    promotionPipeline: product-team-pipeline

    # Jobs
  - name: minute-cron-job
    type: job
    repo: ryvn-mango/minute-cron-job
    build:
      buildpack: nixpack

  # Helm Chart Services
  - name: asset-manager
    type: helm-chart
    repo: ryvn-mango/charts
    build:
      chartPath: asset-manager
  - name: data-ingestor
    type: helm-chart
    repo: ryvn-mango/charts
    build:
      chartPath: data-ingestor

environments:
  - name: prod-us-east
    provider:
      type: aws
      accountId: "941377111598"
    config:
      region: us-east-1
      vpc_cidr: 10.1.0.0/16
    installations:
      - service: frontend-nextjs
        config: |
          requests:
            cpu: 100m
            memory: 0.5Gi
          service:
            port: 3000
          ingress:
            enabled: true
            className: external-nginx
            annotations:
              cert-manager.io/cluster-issuer: external-issuer
              nginx.ingress.kubernetes.io/proxy-body-size: 5g
              nginx.ingress.kubernetes.io/proxy-buffer-size: 32k
            hosts:
              - host: frontend-nextjs.{{ default "example.local"
                  .ryvn.env.state.public_domain.name }}
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - hosts:
                  - frontend-nextjs.{{ default "example.local"
                    .ryvn.env.state.public_domain.name }}
                secretName: frontend-nextjs-ryvn-tls
      - service: backend-fastapi
        config: |
          resources:
            requests:
              cpu: 100m
              memory: 0.5Gi
          service:
            port: 8000
          ingress:
            enabled: true
            className: external-nginx
            annotations:
              cert-manager.io/cluster-issuer: external-issuer
              nginx.ingress.kubernetes.io/proxy-body-size: 5g
              nginx.ingress.kubernetes.io/proxy-buffer-size: 32k
            hosts:
              - host: backend-fastapi.{{ default "example.local"
                  .ryvn.env.state.public_domain.name }}
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - hosts:
                  - backend-fastapi.{{ default "example.local"
                    .ryvn.env.state.public_domain.name }}
                secretName: backend-fastapi-ryvn-tls

  - name: prod-us-west
    provider:
      type: aws
      accountId: "941377111598"
    config:
      region: us-west-2
      vpc_cidr: 10.2.0.0/16
    installations:
      - service: frontend-nextjs
        resources:
          cpuCores: 0.1
          memoryMB: 1024
        config: |
          service:
            port: 3000
          ingress:
            enabled: true
            className: external-nginx
            annotations:
              cert-manager.io/cluster-issuer: external-issuer
              nginx.ingress.kubernetes.io/proxy-body-size: 5g
              nginx.ingress.kubernetes.io/proxy-buffer-size: 32k
            hosts:
              - host: frontend-nextjs.{{ default "example.local"
                  .ryvn.env.state.public_domain.name }}
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - hosts:
                  - frontend-nextjs.{{ default "example.local"
                    .ryvn.env.state.public_domain.name }}
                secretName: frontend-nextjs-ryvn-tls

      - service: backend-fastapi
        resources:
          cpuCores: 0.1
          memoryMB: 1024
        config: |
          service:
            port: 8000
          ingress:
            enabled: true
            className: external-nginx
            annotations:
              cert-manager.io/cluster-issuer: external-issuer
              nginx.ingress.kubernetes.io/proxy-body-size: 5g
              nginx.ingress.kubernetes.io/proxy-buffer-size: 32k
            hosts:
              - host: backend-fastapi.{{ default "example.local"
                  .ryvn.env.state.public_domain.name }}
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - hosts:
                  - backend-fastapi.{{ default "example.local"
                    .ryvn.env.state.public_domain.name }}
                secretName: backend-fastapi-ryvn-tls

promotionPipelines:
  - name: product-team-pipeline
    paths:
      - sourceChannel: staging
        targetChannel: production
      - sourceChannel: production
        targetChannel: stable
