kind: ServiceInstallation
metadata:
  name: temporal-worker
spec:
  service: temporal-worker
  environment: prod-us-east
  config: |
    resources:
      requests:
        cpu: 0.5
        memory: 512Mi
    service:
      port: 8000
    env:
      - name: TEMPORAL_API_KEY
        valueFrom:
          secretKeyRef:
            name: '{{ k8sSecretName "temporal-autoscaling" }}'
            key: apiKey
      - name: TEMPORAL_ENDPOINT
        value: "ap-northeast-1.aws.api.temporal.io:7233"
      - name: TEMPORAL_NAMESPACE
        value: "mango-namespace.ngewf"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    temporal:
      connection: production
      taskQueue: temporal-worker-queue
      targetQueueSize: 5
