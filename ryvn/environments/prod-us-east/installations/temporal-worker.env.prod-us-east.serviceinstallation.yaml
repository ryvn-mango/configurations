kind: ServiceInstallation
metadata:
  name: temporal-worker
spec:
  service: temporal-worker
  environment: prod-us-east
  variableGroups:
    - name: temporal-config
  config: |
    resources:
      requests:
        cpu: 0.5
        memory: 512Mi
    service:
      port: 8000
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    temporal:
      connection: production
      taskQueue: temporal-worker-queue
      targetQueueSize: 5
