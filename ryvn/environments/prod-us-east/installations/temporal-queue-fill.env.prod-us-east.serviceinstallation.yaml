kind: ServiceInstallation
metadata:
  name: temporal-queue-fill
spec:
  service: temporal-queue-fill
  environment: prod-us-east
  config: |
    resources:
      requests:
        cpu: 0.25
        memory: 256Mi
    env:
      - name: TEMPORAL_API_KEY
        valueFrom:
          secretKeyRef:
            name: '{{ k8sSecretName "temporal-autoscaling" }}'
            key: apiKey
      - name: TEMPORAL_ENDPOINT
        value: "ap-northeast-1.aws.api.temporal.io:7233"
      - name: TEMPORAL_NAMESPACE
        value: "mango-namespace.ngewf"
